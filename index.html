<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4a7c59" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>" />
    <title>奈良公园 - 喂鹿游戏 🦌</title>
  </head>
  <body>
    <main id="app">
      <canvas id="game-canvas" aria-label="奈良公园喂鹿游戏"></canvas>

      <!-- HUD -->
      <section id="hud" aria-live="polite">
        <div class="hud-top">
          <div class="hud-left">
            <div class="hud-label">🦌 已喂鹿数</div>
            <div class="hud-value"><span id="score-count">0</span> / <span id="total-count">8</span></div>
          </div>
          <div class="hud-center">
            <div class="hud-item">
              <div class="hud-label">🍘 仙贝</div>
              <div class="hud-value" id="cracker-count">3</div>
            </div>
            <div class="hud-item">
              <div class="hud-label">💰 金钱</div>
              <div class="hud-value" id="money-count">0</div>
            </div>
          </div>
          <div class="hud-right">
            <div class="hud-label">⏱ 用时</div>
            <div class="hud-value" id="timer-value">00:00</div>
          </div>
        </div>
        <div id="status-text">去找小鹿喂食吧！</div>
        <div id="journal-hint" class="hidden">📖 按 [Tab] 打开鹿图鉴</div>
      </section>

      <!-- Vendor hint -->
      <div id="vendor-hint" class="hidden">
        <div class="hint-icon">🏪</div>
        <div class="hint-text">[E] 购买仙贝 (10円)</div>
      </div>

      <!-- Toast message -->
      <div id="toast" class="hidden">错误信息</div>

      <!-- Feed hint -->
      <div id="feed-hint" class="hidden">
        <div class="hint-icon">🦌</div>
        <div class="hint-text">[E] 喂食</div>
      </div>

      <!-- Jump hint -->
      <div id="jump-hint" class="hidden">
        <div class="hint-text">[空格] 跳跃跨越障碍</div>
      </div>

      <!-- Completion overlay -->
      <section id="completion-overlay" class="hidden">
        <div class="completion-card">
          <div class="completion-icon">🎉</div>
          <h2>全部小鹿都喂饱啦！</h2>
          <p class="completion-subtitle">谢谢你！下次再来玩哦 🦌</p>
          <div class="completion-stats">
            <div class="stat">
              <span class="stat-label">用时</span>
              <span class="stat-value" id="completion-time">00:00</span>
            </div>
            <div class="stat">
              <span class="stat-label">已喂鹿数</span>
              <span class="stat-value" id="completion-score">0</span>
            </div>
          </div>
          <button id="restart-button" type="button">再玩一次</button>
        </div>
      </section>

      <!-- Collection Journal -->
      <section id="journal-overlay" class="hidden">
        <div class="journal-backdrop"></div>
        <div class="journal-panel">
          <div class="journal-header">
            <h2>🦌 鹿图鉴</h2>
            <span class="journal-progress"><span id="journal-count">0</span> / <span id="journal-total">16</span></span>
            <button id="journal-close" type="button" aria-label="关闭">✕</button>
          </div>
          <div class="journal-grid" id="journal-grid">
            <!-- Deer cards generated by JS -->
          </div>
        </div>
      </section>

      <!-- Touch controls -->
      <div id="touch-controls" aria-hidden="true">
        <div id="touch-stick">
          <div id="touch-knob"></div>
        </div>
        <div class="touch-right">
          <button id="feed-button" type="button" aria-label="喂食">🦌</button>
          <button id="dash-button" type="button" aria-label="冲刺">🏃</button>
        </div>
      </div>

      <!-- Title overlay -->
      <section id="title-overlay">
        <div class="title-card">
          <div class="title-deer">🦌</div>
          <h1>奈良公園</h1>
          <p class="title-sub">来给鹿喂仙贝吧！</p>
          <div class="title-instructions">
            <p>WASD / 摇杆移动 &nbsp; [空格] 跳跃</p>
            <p>靠近小鹿后按 [E] 喂食</p>
            <p>[Tab] 打开图鉴查看收集进度</p>
          </div>
          <button id="start-button" type="button">开始游戏</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
